<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Degradado para que las estrellas desaparezcan hacia abajo -->
    <linearGradient id="fadeDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"></stop>
      <stop offset="60%" stop-color="white"></stop>
      <stop offset="100%" stop-color="black"></stop>
    </linearGradient>

    <mask id="maskFade">
      <rect width="100%" height="100%" fill="url(#fadeDown)"></rect>
    </mask>

    <!-- brillo -->
    <radialGradient id="glow">
      <stop offset="0%" stop-color="white"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>

    <filter id="soft">
      <feGaussianBlur stdDeviation="1.2"></feGaussianBlur>
    </filter>

    <!-- patrón de estrellas -->
    <pattern id="stars" width="180" height="180" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="40" r="1" fill="white" opacity="0.8"></circle>
      <circle cx="120" cy="80" r="1" fill="white" opacity="0.75"></circle>
      <circle cx="90" cy="20" r="1" fill="white" opacity="0.7"></circle>
      <circle cx="150" cy="140" r="1" fill="white" opacity="0.8"></circle>
    </pattern>

  </defs>

  <!-- fondo negro -->
  <rect width="100%" height="100%" fill="#000"></rect>

  <!-- estrellas con fade -->
  <g mask="url(#maskFade)">
    <rect width="100%" height="100%" fill="url(#stars)"></rect>

    <!-- estrellas brillantes -->
    <g filter="url(#soft)">
      <circle cx="300" cy="200" r="5" fill="url(#glow)"></circle>
      <circle cx="700" cy="350" r="6" fill="url(#glow)"></circle>
      <circle cx="900" cy="150" r="5" fill="url(#glow)"></circle>
      <circle cx="500" cy="500" r="4" fill="url(#glow)"></circle>
    </g>
  </g>

</svg>