<svg viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- brillo de estrellas -->
<radialGradient id="glow">
  <stop offset="0%" stop-color="white"></stop>
  <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
</radialGradient>

<filter id="soft">
  <feGaussianBlur stdDeviation="1.2"></feGaussianBlur>
</filter>

<!-- patrón de estrellas -->
<pattern id="stars" width="120" height="120" patternUnits="userSpaceOnUse">

  <circle cx="20" cy="30" r="1" fill="white" opacity="0.9"></circle>
  <circle cx="80" cy="60" r="1" fill="white" opacity="0.7"></circle>
  <circle cx="60" cy="10" r="1" fill="white" opacity="0.8"></circle>
  <circle cx="110" cy="90" r="1" fill="white" opacity="0.9"></circle>
  <circle cx="40" cy="100" r="1" fill="white" opacity="0.8"></circle>
  <circle cx="10" cy="70" r="1" fill="white" opacity="0.7"></circle>

</pattern>

</defs>

<!-- fondo -->
<rect width="100%" height="100%" fill="#000"></rect>

<!-- estrellas -->
<rect width="100%" height="100%" fill="url(#stars)"></rect>

<!-- estrellas grandes -->
<g filter="url(#soft)">
  <circle cx="200" cy="300" r="5" fill="url(#glow)"></circle>
  <circle cx="700" cy="150" r="6" fill="url(#glow)"></circle>
  <circle cx="900" cy="400" r="5" fill="url(#glow)"></circle>
  <circle cx="400" cy="800" r="6" fill="url(#glow)"></circle>
  <circle cx="800" cy="1100" r="5" fill="url(#glow)"></circle>
  <circle cx="300" cy="1400" r="6" fill="url(#glow)"></circle>
  <circle cx="600" cy="1700" r="5" fill="url(#glow)"></circle>
  <circle cx="950" cy="1600" r="5" fill="url(#glow)"></circle>
</g>

</svg>