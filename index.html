<!-- 🎬 SCRIPT ÚNICO LIMPIO -->
<script>
const musica = document.getElementById("musica");
const btnMusica = document.getElementById("btnMusica");
const tulipanes = document.querySelectorAll(".tulipan");
const cristal = document.querySelector(".cristal");
const contenedor = document.getElementById("contenedorParticulas");

let reproduciendo = false;

// 🎵 Música + efectos
btnMusica.addEventListener("click", () => {
    if (!reproduciendo) {
        musica.play();
        btnMusica.innerHTML = "⏸";
        cristal.classList.add("brillo");
        document.body.classList.add("particulas-on");
        reproduciendo = true;
    } else {
        musica.pause();
        btnMusica.innerHTML = "🎵";
        cristal.classList.remove("brillo");
        document.body.classList.remove("particulas-on");
        reproduciendo = false;
    }
});

// 🌸 Click individual
tulipanes.forEach(t => {
    t.addEventListener("click", () => {
        t.classList.toggle("open");
    });
});

// 🌫 Crear partículas
for (let i = 0; i < 25; i++) {
    let p = document.createElement("div");
    p.classList.add("particula");
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDelay = Math.random() * 8 + "s";
    contenedor.appendChild(p);
}

const capaCometas = document.querySelector(".cometas");

function crearCometa() {

    const cometa = document.createElement("div");
    cometa.classList.add("cometa-real");

    // posición vertical distinta
    const startY = Math.random() * window.innerHeight * 0.7;
    cometa.style.top = startY + "px";

    capaCometas.appendChild(cometa);

    let startTime = null;

    const duracion = 5 + Math.random() * 2; // lento
    const maxLargo = 12; // no muy largo

    function animar(timestamp){
        if(!startTime) startTime = timestamp;
        const progreso = (timestamp - startTime) / (duracion * 1000);

        if(progreso < 1){

            // movimiento horizontal
            const x = progreso * (window.innerWidth + 200);

            // caída suave diagonal
            const y = startY + progreso * 160;

            // ✨ crecer progresivamente
            const largoActual = progreso * maxLargo;
            cometa.style.width = largoActual + "px";

            cometa.style.transform = `translate(${x}px, ${y}px) rotate(18deg)`;

            requestAnimationFrame(animar);
        } else {
            cometa.remove();
        }
    }

    requestAnimationFrame(animar);
}

// lanzar 3 al mismo tiempo cada cierto tiempo
function lanzarGrupo(){
    for(let i = 0; i < 6; i++){
        setTimeout(() => {
            crearCometa();
        }, i * 150); // pequeño desfase natural
    }
}

setInterval(lanzarGrupo, 2500);

const btnIniciar = document.getElementById("btnIniciar");
const inicio = document.getElementById("inicio");

btnIniciar.addEventListener("click", () => {
    document.body.classList.add("iniciado");
    inicio.style.opacity = "0";

    setTimeout(() => {
        inicio.remove();
    }, 800);
});

</script>
